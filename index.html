<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Hulio - Kasir Bengkel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
      // Kunci konfigurasi utama yang bertindak sebagai virtual .env
      const CONFIG_KEY = 'HGROUP_CLOUD_CONFIG';
      
      const envProxy = {
        NODE_ENV: 'production',
        browser: true
      };

      Object.defineProperty(envProxy, 'API_KEY', {
        get() { 
          try {
            const raw = localStorage.getItem(CONFIG_KEY);
            if (!raw) return '';
            const config = JSON.parse(raw);
            return config.openRouterApiKey || config.geminiApiKey || ''; 
          } catch (e) { return ''; }
        },
        enumerable: true,
        configurable: false
      });

      window.process = window.process || {};
      Object.defineProperty(window.process, 'env', {
        value: envProxy,
        writable: false,
        configurable: false
      });
      
      window.global = window;
    </script>

    <style>
        body {
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          background: #f8fafc;
          margin: 0;
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
          color: #1e293b;
        }
        #root:empty { display: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>

<!-- Import map removed: Vite handles bundling from node_modules. 
     CDN versions conflicted with npm packages (React 19.0.0 vs 19.2.5, etc.) -->
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
